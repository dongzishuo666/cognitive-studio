<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>认知增强工作室 | 进化型多AI协作系统</title>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            max-width: 1400px;
            margin: 20px auto;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: #1e1e2f;
            color: #eee;
            padding: 0 15px;
            position: relative;
        }
        h2 { margin-top: 0; }
        .config-panel {
            background: #2d2d3a;
            border-radius: 12px;a
            padding: 15px;
            margin-bottom: 20px;
        }
        .config-header {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .model-config {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
            min-height: 100px;
        }
        .model-card {
            background: #3a3a4a;
            border-radius: 10px;
            padding: 10px;
            flex: 1;
            min-width: 150px;
            transition: box-shadow 0.2s;
        }
        .model-card.sort-mode-active { cursor: grab; }
        .model-card.sort-mode-active:active { cursor: grabbing; }
        .model-card h3 {z
            margin: 0 0 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        .model-card input {
            width: 100%;
            padding: 6px;
            border-radius: 6px;
            border: none;
            background: #2d2d3a;
            color: #eee;
            margin-top: 5px;
            font-size: 11px;
        }
        .model-card label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .model-desc { font-size: 10px; color: #aaa; margin-top: 4px; line-height: 1.3; }
        .model-status { font-size: 10px; margin-top: 4px; }
        .healthy { color: #4caf50; }
        .unhealthy { color: #f44336; }
        .key-error { color: #ffaa66; }
        #chat {
            height: 480px;
            overflow-y: auto;
            border: 1px solid #444;
            padding: 12px;
            background: #2d2d3a;
            border-radius: 12px;
            margin-bottom: 10px;
            position: relative;
        }
        .topic-bar {
            background: #2d2d3a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #ffaa66;
            word-break: break-word;
            white-space: normal;
        }
        .message {
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 85%;
            clear: both;
            word-wrap: break-word;
            position: relative;
            transition: background 0.2s;
        }
        .message.long-press-active { background: #4a4a5a; }
        .user { background: #0a6e6e; float: right; text-align: right; }
        .ai {
            background: #3a3a4a;
            float: left;
            border-left-width: 4px;
            border-left-style: solid;
        }
        .ai-deepseek { border-left-color: #3498db; }
        .ai-gemini { border-left-color: #2ecc71; }
        .ai-cohere { border-left-color: #e67e22; }
        .ai-grok { border-left-color: #9b59b6; }
        .ai-perplexity { border-left-color: #f1c40f; }
        .ai-claude { border-left-color: #e74c3c; }
        .ai-doubao { border-left-color: #1abc9c; }
        .ai-volcano { border-left-color: #f39c12; }
        .ai-fangzhou { border-left-color: #ff6b6b; }
        .ai-doubaopro { border-left-color: #ffaa66; }
        .ai-openai { border-left-color: #95a5a6; }
        .system {
            background: #2d2d2d;
            text-align: center;
            font-style: italic;
            color: #aaa;
            float: none;
            max-width: 100%;
            margin: 5px auto;
        }
        .memory {
            background: #1e4a3a;
            border-left: 4px solid #4caf50;
            float: none;
            max-width: 95%;
            margin: 8px auto;
        }
        .attachment {
            background: #2c5a6e;
            border-left: 4px solid #f39c12;
            float: none;
            max-width: 95%;
            margin: 8px auto;
        }
        .delete-msg {
            position: absolute;
            top: 4px;
            right: 8px;
            cursor: pointer;
            opacity: 0;
            font-size: 14px;
            color: #ff8888;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 0 4px;
            transition: opacity 0.2s;
        }
        .message:hover .delete-msg { opacity: 0.6; }
        .delete-msg:hover { opacity: 1 !important; color: #ff5555; background: rgba(0,0,0,0.5); }
        .clear { clear: both; }
        .message strong, .message b { color: #ffaa66; font-weight: bold; }
        .message li, .message .list-item { color: #88ccff; }
        .scroll-bottom-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0a6e6e;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .scroll-bottom-btn:hover { background: #0e8a8a; }
        .input-area, .auto-area {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        input, button, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }
        input, select { flex: 1; background: #2d2d3a; color: #eee; }
        button {
            background: #0a6e6e;
            color: white;
            cursor: pointer;
        }
        button:hover { background: #0e8a8a; }
        button:disabled { background: #555; cursor: not-allowed; }
        .mode-select { width: auto; min-width: 140px; }
        .custom-mode-input, .roleplay-inputs { display: none; flex:1; gap: 8px; }
        .custom-mode-input.active, .roleplay-inputs.active { display: flex; }
        .help-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #555;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 6px;
        }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            color: #eee;
            padding: 12px;
            border-radius: 12px;
            max-width: 360px;
            z-index: 1000;
            font-size: 12px;
            pointer-events: none;
        }
        .modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #2d2d3a;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }
        .modal-close-btn {
            position: sticky;
            top: 12px;
            float: right;
            background: #c0392b;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            margin-bottom: 10px;
        }
        .modal-close-btn:hover { background: #e74c3c; }
        .memory-item {
            background: #3a3a4a;
            margin: 12px 0;
            padding: 12px;
            border-radius: 8px;
        }
        .memory-actions { display: flex; gap: 8px; margin-top: 8px; }
        .memory-actions button { background: #555; padding: 4px 8px; font-size: 12px; }
        .full-content-modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .full-content-modal .modal-card {
            background: #2d2d3a;
            border-radius: 12px;
            width: 80%;
            max-width: 800px;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            color: #eee;
            position: relative;
        }
        .full-content-modal .modal-close-btn {
            position: sticky;
            top: 12px;
            float: right;
        }
        .search-box { margin-bottom: 12px; width: 100%; }
        .lang-switch { margin-left: auto; }
        .guide-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .guide-card {
            background: #2d2d3a;
            border-radius: 20px;
            padding: 24px;
            max-width: 500px;
            pointer-events: auto;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .guide-card h3 { margin-top: 0; }
        .guide-card button { background: #0a6e6e; margin-top: 16px; padding: 8px 20px; }
        .guide-highlight {
            position: relative;
            z-index: 10001;
            box-shadow: 0 0 0 4px #ffaa66, 0 0 0 8px rgba(0,0,0,0.3);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .cognitive-controls {
            background: #2d2d3a;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            font-size: 13px;
        }
        .consensus-threshold {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        @media print {
            body { background: white; color: black; }
            .config-panel, .auto-area, .input-area, .scroll-bottom-btn, .delete-msg, button, .help-icon, .lang-switch, #guideOverlay, .cognitive-controls { display: none; }
            .message { background: white !important; color: black !important; border: 1px solid #ccc; }
            .ai, .user, .system, .memory, .attachment { background: white; color: black; }
            .message strong, .message b { color: #d9534f; }
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .model-card { min-width: 120px; }
            button, input, select { font-size: 12px; padding: 8px; }
            .delete-msg { font-size: 12px; top: 2px; right: 4px; opacity: 0.6; }
            .message { max-width: 95%; }
            .scroll-bottom-btn { width: 40px; height: 40px; font-size: 20px; bottom: 20px; right: 20px; }
            .full-content-modal .modal-card { width: 95%; }
        }
    </style>
</head>
<body>
<div id="guideOverlay" class="guide-overlay" style="display: none;">
    <div class="guide-card">
        <h3 id="guideTitle">🎉 欢迎使用认知增强工作室</h3>
        <p id="guideText">这是一个多AI协作思考系统。你可以同时启用多个AI模型，让它们围绕你的问题自动讨论，并生成结构化总结。</p>
        <p id="guideCounter"></p>
        <button id="guideLangBtn" style="background:#555;">🌐 中文/English</button>
        <button id="guideNextBtn">下一步</button>
        <button id="guideSkipBtn" style="background:#555; margin-left:10px;">跳过</button>
    </div>
</div>

<h2 id="mainTitle">🧠 认知增强工作室 | 进化型多AI协作系统</h2>
<div class="config-panel">
    <div class="config-header">
        <strong id="configLabel">⚙️ 模型配置</strong>
        <button id="exportConfigBtn" style="background:#16a085;">📤 <span id="exportText">导出配置</span></button>
        <button id="importConfigBtn" style="background:#2c5a6e;">📥 <span id="importText">导入配置</span></button>
        <button id="clearAllKeysBtn" style="background:#c0392b;">🗑️ <span id="clearKeysText">清除所有API Key</span></button>
        <button id="toggleSortModeBtn" style="background:#8e44ad;">🔀 <span id="sortModeText">排序模式关闭</span></button>
        <button id="langSwitchBtn" class="lang-switch" style="background:#555;">🌐 <span id="langBtnText">English</span></button>
        <span id="saveStatus"></span>
    </div>
    <div class="model-config" id="modelCards"></div>
    <button id="saveKeysBtn"><span id="saveKeysText">保存所有API Key</span></button>
</div>

<div class="cognitive-controls">
    <label><input type="checkbox" id="enableCognitiveContinuity" checked> <span id="cognitiveContinuityText">🧠 认知连续性</span></label>
    <label><input type="checkbox" id="enableConflictHandling" checked> <span id="conflictHandlingText">⚡ 自动处理框架冲突</span></label>
    <label><input type="checkbox" id="enableSelfCriticism" checked> <span id="selfCriticismText">🪞 自我批判意识</span></label>
    <label><span id="sensitivityLabel">📊 框架演化敏感度</span>
        <select id="frameSensitivity">
            <option value="low">低（尽量沿用）</option>
            <option value="medium" selected>中（平衡）</option>
            <option value="high">高（易重构）</option>
        </select>
    </label>
    <div class="consensus-threshold">
        <span id="consensusThresholdLabel">🎯 共识严格程度</span>
        <select id="consensusThreshold">
            <option value="loose">宽松</option>
            <option value="medium" selected>标准</option>
            <option value="strict">严格</option>
        </select>
    </div>
    <button id="resetCognitiveFrameBtn" style="background:#c0392b;">🔄 <span id="resetFrameText">重置认知框架</span></button>
</div>

<div id="topicBar" class="topic-bar">💡 <span id="topicPrefix">当前讨论主题：</span><span id="topicValue">未设置</span></div>
<div id="chat"></div>
<button id="scrollBottomBtn" class="scroll-bottom-btn" title="Scroll to bottom">↓</button>

<div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息，所有启用的AI会同时回复...">
    <button id="sendBtn"><span id="sendText">发送</span></button>
    <button id="stopSendBtn" style="background:#c0392b; display:none;"><span id="stopSendText">停止生成</span></button>
    <label style="display:inline-flex; align-items:center; gap:4px;"><input type="checkbox" id="teamPerceptionCheckbox" checked> <span id="teamPerceptionText">团队感知</span></label>
    <label style="display:inline-flex; align-items:center; gap:4px;"><input type="checkbox" id="serialModeCheckbox"> <span id="serialModeText">串行协作</span></label>
    <button id="continueBtn" style="background:#2c5a6e;">✍️ <span id="continueText">继续</span></button>
    <button id="uploadBtn" style="background:#f39c12;">📎 <span id="uploadText">上传附件</span></button>
    <button id="clearLastAttachmentBtn" style="background:#e67e22;">🗑️ <span id="clearAttachText">清除最后附件影响</span></button>
    <button id="cnkiBtn" style="background:#2c5a6e;">📚 <span id="cnkiText">知网增强</span></button>
    <button id="summarizeBtn" style="background:#2c5a6e;">📝 <span id="summarizeText">总结并记忆</span></button>
    <span class="help-icon" id="summaryHelp">?</span>
    <button id="openMemoryBtn" style="background:#8e44ad;">📚 <span id="memoryBtnText">记忆库</span></button>
    <button id="exportMarkdownBtn" style="background:#16a085;">📄 <span id="exportMdText">导出MD</span></button>
    <button id="exportPdfBtn" style="background:#c0392b;">📑 <span id="exportPdfText">导出PDF</span></button>
    <button id="clearKeepMemoryBtn" style="background:#c0392b;">🗑️ <span id="clearKeepText">清空对话(保留记忆)</span></button>
    <button id="cleanOldMsgBtn" style="background:#e67e22;">🧹 <span id="cleanOldText">清理旧消息</span></button>
</div>
<input type="file" id="fileInput" style="display:none" accept=".txt,.md,.csv,.json,.docx,.xlsx,.xls">

<div class="auto-area">
    <div class="discuss-mode">
        <span id="discussPeopleLabel">讨论人数：</span>
        <label><input type="radio" name="discussCount" value="2" checked> <span id="twoPeople">2人</span></label>
        <label><input type="radio" name="discussCount" value="3"> <span id="threePeople">3人</span></label>
    </div>
    <select id="ai1Select"></select>
    <select id="ai2Select"></select>
    <select id="ai3Select" style="display:none"></select>
    <select id="purposeMode" class="mode-select"></select>
    <div id="roleplayInputs" class="roleplay-inputs">
        <input type="text" id="roleA" placeholder="角色A (例如: 牛顿)" style="flex:1;">
        <input type="text" id="roleB" placeholder="角色B (例如: 爱因斯坦)" style="flex:1;">
        <div style="display: flex; gap: 5px;">
            <button class="role-preset" data-a="牛顿" data-b="爱因斯坦">🧠 牛顿 vs 爱因斯坦</button>
            <button class="role-preset" data-a="孔子" data-b="苏格拉底">🌍 孔子 vs 苏格拉底</button>
            <button class="role-preset" data-a="乔布斯" data-b="马斯克">💡 乔布斯 vs 马斯克</button>
        </div>
    </div>
    <input type="text" id="customModeInput" class="custom-mode-input" placeholder="自定义指令..." style="display:none; flex:1;">
    <input type="text" id="topicInput" placeholder="讨论主题" style="flex:2;" oninput="updateTopicBar()">
    <input type="number" id="roundsInput" placeholder="轮数" value="3" min="1" max="20" style="width: 80px;">
    <label><input type="checkbox" id="untilConsensusCheckbox"> <span id="untilConsensusText">直到共识</span></label>
    <!-- 删除冗余的共识敏感度下拉，合并到上面的共识严格程度 -->
    <button id="startAutoBtn"><span id="startAutoText">开始自动讨论</span></button>
    <button id="stopAutoBtn" disabled><span id="stopAutoText">停止</span></button>
    <button id="smartTeamBtn" style="background:#8e44ad;">🧠 <span id="smartTeamText">智能组队讨论</span></button>
</div>

<div id="memoryModal" class="modal">
    <div class="modal-content">
        <button class="modal-close-btn" id="memoryModalCloseBtn">✕ 关闭</button>
        <h3 id="memoryModalTitle">记忆库与认知进化链</h3>
        <input type="text" id="memorySearch" class="search-box" placeholder="搜索关键词...">
        <div id="memoryList"></div>
        <button id="closeMemoryModal" style="margin-top: 12px;"><span id="closeModalText">关闭</span></button>
    </div>
</div>
<div id="fullContentModal" class="full-content-modal">
    <div class="modal-card">
        <button class="modal-close-btn" id="fullContentModalCloseBtn">✕ 关闭</button>
        <h3 id="fullContentTitle">完整记忆内容</h3>
        <div id="fullContentText" style="white-space: pre-wrap; word-wrap: break-word; background: #1e1e2f; padding: 12px; border-radius: 8px;"></div>
        <button id="closeFullModal" style="margin-top: 12px;"><span id="closeFullText">关闭</span></button>
    </div>
</div>

<script>
    // ==================== 模型定义 ====================
    const MODELS = {
        deepseek: { id:"deepseek", name:"DeepSeek", color:"🔵", apiKey:"", enabled:true, model:"deepseek-chat", description:"逻辑严谨", healthy:true },
        gemini: { id:"gemini", name:"Gemini", color:"🟢", apiKey:"", enabled:false, model:"gemini-2.5-flash", description:"快速轻量", healthy:true },
        cohere: { id:"cohere", name:"Cohere", color:"🟠", apiKey:"", enabled:false, model:"command-r", description:"指令跟随", healthy:true },
        grok: { id:"grok", name:"Grok", color:"💬", apiKey:"", enabled:false, model:"x-ai/grok-4-fast:free", description:"幽默敢说", healthy:true },
        perplexity: { id:"perplexity", name:"Perplexity", color:"🔍", apiKey:"", enabled:false, model:"llama-3.1-sonar-large-128k-online", description:"联网搜索", healthy:true },
        claude: { id:"claude", name:"Claude", color:"🟣", apiKey:"", enabled:false, model:"anthropic/claude-3.5-sonnet", description:"文笔细腻", healthy:true },
        doubao: { id:"doubao", name:"豆包 (APIYI)", color:"🟡", apiKey:"", enabled:false, model:"doubao-seed-1-6-250615", description:"中文出色", healthy:true },
        volcano: { id:"volcano", name:"火山豆包", color:"🌋", apiKey:"", enabled:false, model:"doubao-seed-1-6-250615", description:"火山官方", healthy:true },
        fangzhou: { id:"fangzhou", name:"火山方舟", color:"🔥", apiKey:"", enabled:false, model:"doubao-pro-32k", description:"豆包Pro", healthy:true },
        doubaoPro: { id:"doubaoPro", name:"Doubao-2.0-Pro", color:"🌟", apiKey:"", enabled:false, model:"doubao-seed-2-0-pro", description:"旗舰级推理", healthy:true },

    function formatMarkdown(text) {

        safe = safe.replace(/^(\-\s+)(.*?)$/gm, '<span class="list-item">$1$2</span>');
        safe = safe.replace(/\n/g, '<br>');
        return safe;

    function retrieveRelevantMemories(topic, limit = 3) {

        if (!memories.length) return [];
        const keywords = topic.toLowerCase().split(/\s+/).filter(w => w.length > 1);
        const scored = memories.map(mem => {
            let score = 0;
            const content = (mem.cognitiveFrame || "") + " " + (mem.deepInsights || []).join(" ") + " " + mem.content;
            const lower = content.toLowerCase();
            for (let kw of keywords) {
                if (lower.includes(kw)) score += 2;
            }
            if (lower.includes(topic.toLowerCase())) score += 5;
            return { mem, score };
        });
        scored.sort((a,b) => b.score - a.score);
        const filtered = scored.filter(s => s.score >= memoryRelevanceThreshold).slice(0, limit);
        return filtered.map(s => s.mem);
    }

                        }
                    }
                    activeControllers = activeControllers.filter(c => c !== controller);
                    return fullContent;
                } else {
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    let content = data.reply;
                    if (!rawMarkdown) {
                        content = formatMarkdown(content);
                        addMessage("ai", content, modelId);
                    }
                    activeControllers = activeControllers.filter(c => c !== controller);
                    return content;
                }
            } catch (e) {
                if (attempt < retries && e.name !== "AbortError") {
                    console.log(`Retry ${attempt+1} for ${modelId}`);
                    await new Promise(r => setTimeout(r, 1000));
                    return attemptCall(attempt + 1);
                }
                throw e;
            }
        };
        
        try {
            return await attemptCall(0);
        } catch (e) {
            activeControllers = activeControllers.filter(c => c !== controller);
            if (e.name !== "AbortError") {
                addSystemMessage(`❌ ${m.name} ${currentLang === "zh" ? "调用失败" : "failed"}: ${e.message}`);
            }
            throw e;
        }
    }
    // ==================== 手动发送 ====================
    async function sendManual() {
        const text = document.getElementById("userInput").value.trim();
        if (!text) return;
        addMessage("user", text);
        document.getElementById("userInput").value = "";
        const enabledModels = Object.values(MODELS).filter(m => m.enabled && m.apiKey);
        if (enabledModels.length === 0) {
            addSystemMessage(currentLang === "zh" ? "没有启用的模型" : "No enabled models");

        }
        const teamPerception = document.getElementById("teamPerceptionCheckbox").checked;
        const serialMode = document.getElementById("serialModeCheckbox").checked;
        const cognitiveContinuity = document.getElementById("enableCognitiveContinuity").checked;
        let relevantMemory = null;
        if (cognitiveContinuity) {
            const memories = retrieveRelevantMemories(text, 1);
            if (memories.length) relevantMemory = memories[0];
        }
        document.getElementById("stopSendBtn").style.display = "inline-block";
        if (serialMode) {
            let fullHistory = [];
            for (const m of enabledModels) {
                let prompt = text;
                if (teamPerception) {
                    const peers = getPeersList(m.id);
                    prompt = peers ? `${peers}\n\n用户问题：${text}` : text;
                }
                if (fullHistory.length > 0) {
                    const previous = fullHistory.map(h => `${h.name}：${h.content}`).join("\n\n");
                    prompt = `${prompt}\n\n前面其他AI的回答：\n${previous}\n\n请批判性分析以上回答，指出正确之处或质疑可能错误之处，然后给出你的观点。`;
                }
                try {
                    const reply = await callModel(m.id, prompt, null, false, false, relevantMemory, 1);
                    fullHistory.push({ name: m.name, content: reply });
                } catch (e) {}
            }
        } else {
            const promises = enabledModels.map(m => {
                let prompt = text;
                if (teamPerception) {
                    const peers = getPeersList(m.id);
                    prompt = peers ? `${peers}\n\n用户问题：${text}` : text;
                }
                return callModel(m.id, prompt, null, false, false, relevantMemory, 1).catch(e => null);
            });
            await Promise.all(promises);
        }
        document.getElementById("stopSendBtn").style.display = "none";
    }

    // ==================== 自动讨论（集成共识裁判、失败重试、合并阈值） ====================
    async function startAutoDiscussion() {
        if (autoActive) { addSystemMessage(currentLang === "zh" ? "已有讨论进行中" : "Discussion in progress"); return; }
        const mode = document.querySelector('input[name="discussCount"]:checked').value;
        const ai1 = document.getElementById("ai1Select").value;
        const ai2 = document.getElementById("ai2Select").value;
        let modelIds = [ai1, ai2];
        if (mode === "3") {
            const ai3 = document.getElementById("ai3Select").value;
            if (ai3) modelIds.push(ai3);
        }
        const topic = document.getElementById("topicInput").value.trim();
        if (!topic) { addSystemMessage(currentLang === "zh" ? "请输入讨论主题" : "Please enter a topic"); return; }
        let rounds = parseInt(document.getElementById("roundsInput").value) || 3;
        const untilConsensus = document.getElementById("untilConsensusCheckbox").checked;
        const purpose = document.getElementById("purposeMode").value;
        let custom = "", roleA = "", roleB = "";
        if (purpose === "custom") custom = document.getElementById("customModeInput").value.trim();
        else if (purpose === "roleplay") {
            roleA = document.getElementById("roleA").value.trim();
            roleB = document.getElementById("roleB").value.trim();
            if (!roleA || !roleB) { addSystemMessage(currentLang === "zh" ? "请填写角色A和角色B" : "Please fill roles"); return; }
        }
        autoActive = true;
        autoAbort = false;
        document.getElementById("startAutoBtn").disabled = true;
        document.getElementById("stopAutoBtn").disabled = false;
        let round = 1, index = 0;
        let history = [];
        addSystemMessage(`${currentLang === "zh" ? "🤖 自动讨论开始，主题：" : "🤖 Auto discussion started, topic:"} ${topic}`);
        const teamPerception = document.getElementById("teamPerceptionCheckbox").checked;
        const cognitiveContinuity = document.getElementById("enableCognitiveContinuity").checked;
        const conflictHandling = document.getElementById("enableConflictHandling").checked;
        // 使用统一的共识严格程度（合并后的控件）
        const consensusStrictness = document.getElementById("consensusThreshold").value;
        
        let relevantMemory = null;
        if (cognitiveContinuity) {
            const mems = retrieveRelevantMemories(topic, 1);
            if (mems.length) relevantMemory = mems[0];
        }
        
        // 共识裁判函数（带重试，最多2次）
        async function judgeConsensus(roundNum, currentHistory, firstModelId) {
            const judgePrompt = currentLang === "zh" ?
                `你作为裁判，请判断到目前为止的讨论是否已经达成了共识。共识判断标准：${consensusStrictness === 'strict' ? '所有关键观点必须完全一致且无补充意见' : (consensusStrictness === 'medium' ? '核心结论一致，细节可略有差异' : '主要方向一致即可')}。\n\n讨论主题：${topic}\n\n讨论记录：\n${currentHistory.map(h => `[${h.name}]：${h.content}`).join('\n\n')}\n\n请输出格式：【共识判断】已达成共识 / 未达成共识。理由：……` :
                `As judge, determine whether consensus has been reached. Criteria: ${consensusStrictness === 'strict' ? 'all key points must be fully consistent' : (consensusStrictness === 'medium' ? 'core conclusions consistent, minor differences allowed' : 'main direction consistent')}.\n\nTopic: ${topic}\n\nDiscussion:\n${currentHistory.map(h => `[${h.name}]：${h.content}`).join('\n\n')}\n\nOutput format: [Consensus] Reached / Not reached. Reason: ...`;
            for (let attempt = 0; attempt < 2; attempt++) {
                try {
                    const reply = await callModel(firstModelId, judgePrompt, null, true, false, null, 0); // 裁判不重试，外层控制
                    const reached = reply.includes("已达成共识") || reply.includes("Reached");
                    addSystemMessage(`⚖️ 裁判（${MODELS[firstModelId].name}）判断：${reached ? (currentLang === "zh" ? "已达成共识" : "Consensus reached") : (currentLang === "zh" ? "未达成共识" : "Consensus not reached")}\n理由：${reply.substring(0, 200)}`);
                    return reached;
                } catch(e) {
                    addSystemMessage(`⚠️ 裁判判断失败 (尝试 ${attempt+1}/2): ${e.message}`);
                    if (attempt === 0) await new Promise(r => setTimeout(r, 1000));
                }
            }
            addSystemMessage(`⚠️ 裁判判断失败，继续讨论。`);
            return false;
        }
        
        while ((round <= rounds || (untilConsensus && !autoAbort)) && !autoAbort) {
            const currentId = modelIds[index];
            const currentModel = MODELS[currentId];
            let prompt = "";
            const isFirstRoundFirstSpeaker = (round === 1 && index === 0);
            let historyText = history.map(h => `[${h.name}]：${h.content}`).join("\n\n");
            
            if (isFirstRoundFirstSpeaker) {
                let framePrefix = "";
                if (cognitiveContinuity && relevantMemory && relevantMemory.cognitiveFrame) {
                    framePrefix = currentLang === "zh" ?
                        `基于我们之前形成的认知框架（${relevantMemory.cognitiveFrame.substring(0, 200)}...），请先以此为基础表达你的观点。` :
                        `Based on our previously formed cognitive framework (${relevantMemory.cognitiveFrame.substring(0, 200)}...), please express your views based on it first.`;
                }
                if (purpose === "roleplay") {
                    prompt = `${framePrefix}\n你是第一位发言者。请开始角色扮演对话。主题：${topic}\n角色A（${roleA}）首先发言。请扮演${roleA}，以该角色的身份、语言风格和知识背景发表观点。请尽量完整、有深度地阐述你的看法，并留下可供后续讨论的空间。`;
                } else if (purpose === "custom") {
                    prompt = `${framePrefix}\n你是第一位发言者。请对主题“${topic}”进行初步分析。${custom ? `额外要求：${custom}` : ''}请尽量全面、深入地表达你的观点，独立完成你的发言。结尾可以提出一两个开放性问题。`;
                } else if (purpose === "factFinding") {
                    prompt = `${framePrefix}\n你是第一位发言者。请针对问题“${topic}”给出最直接、准确的答案，并附上关键依据。`;
                } else if (purpose === "personalGrowth") {
                    prompt = `${framePrefix}\n你是第一位发言者。请以个人成长顾问的身份，针对用户的问题“${topic}”，从多个维度提出具体、可操作的建议。`;
                } else {
                    const modeMap = { free:"自由讨论", critical:"批判性分析", constructive:"建设性建议", debate:"辩论", summary:"总结提炼", academic:"学术深度", simple:"通俗易懂", cross:"跨文化比较", creative:"创意发散" };
                    let modeText = modeMap[purpose] || "初步分析";
                    prompt = `${framePrefix}\n你是第一位发言者。请对主题“${topic}”进行${modeText}。请独立、完整地表达你的观点，不要预判其他AI的回答。结尾可以提出值得探讨的方向。`;
                }
            } else {
                let baseInstruction = "";
                if (purpose === "roleplay") {
                    const isRoleA = (round % 2 === 1 && index === 0) || (round % 2 === 0 && index === 1);
                    const currentRole = isRoleA ? roleA : roleB;
                    baseInstruction = `请基于以上所有讨论，继续角色扮演对话。请扮演${currentRole}，回应上一位发言者。${custom ? ` 额外要求：${custom}` : ''}`;
                } else if (purpose === "custom") {
                    baseInstruction = `请基于以上所有讨论，发表你的看法。${custom ? ` 额外要求：${custom}` : ''}`;
                } else if (purpose === "factFinding") {
                    baseInstruction = `请基于以上所有讨论，若答案已明确则不再补充；若有新事实请简要说明，否则结束。`;
                } else if (purpose === "personalGrowth") {
                    baseInstruction = `请基于以上所有讨论，继续从个人成长角度补充建议，或对已有建议进行细化。`;
                } else {
                    const modeMap = { free:"自由发表看法", critical:"批判性分析回应", constructive:"建设性建议回应", debate:"继续辩论", summary:"总结整合", academic:"学术深度回应", simple:"通俗易懂回应", cross:"跨文化比较回应", creative:"创意发散回应" };
                    baseInstruction = (modeMap[purpose] || "发表你的看法") + "。";
                }
                if (conflictHandling && relevantMemory && relevantMemory.cognitiveFrame) {
                    baseInstruction += currentLang === "zh" ?
                        `\n\n如果新信息与既有认知框架（${relevantMemory.cognitiveFrame.substring(0, 100)}...）冲突，请明确指出冲突点，并尝试修正框架或记录张力。` :
                        `\n\nIf new information conflicts with the existing cognitive framework, explicitly state the conflict and attempt to revise the framework or record the tension.`;
                }
                if (document.getElementById("enableSelfCriticism").checked) {
                    baseInstruction += currentLang === "zh" ?
                        `\n\n请反思：你的观点是否可能遗漏了其他重要角度？如果发现自己之前的观点有片面性，请主动修正。` :
                        `\n\nReflect: Could your view be missing other important angles? If you find your previous views one-sided, actively correct them.`;
                }
                baseInstruction += `\n\n前面讨论：\n${historyText}`;
                prompt = baseInstruction;
            }
            
            addSystemMessage(`📢 ${currentLang === "zh" ? "第" : "Round "}${round}${currentLang === "zh" ? "轮，" : ", "}${currentModel.name} ${currentLang === "zh" ? "发言" : "speaks"}`);
            try {
                // 重试1次
                const reply = await callModel(currentId, prompt, null, false, true, relevantMemory, 1);
                if (reply) history.push({ name: currentModel.name, content: reply });
            } catch(e) { 
                addSystemMessage(`${currentModel.name} ${currentLang === "zh" ? "发言失败（已重试）" : "failed after retry"}`);
                // 发言失败后不推进索引，允许下次重试？但为了不卡死，仍推进，但少一个观点
            }
            index = (index + 1) % modelIds.length;
            if (index === 0) {
                round++;
                // 从第三轮结束开始（round>3），且直到共识开启时
                if (untilConsensus && round > 3 && history.length >= 3) {
                    const firstModelId = modelIds[0];
                    const consensusReached = await judgeConsensus(round-1, history, firstModelId);
                    if (consensusReached) {
                        addSystemMessage(currentLang === "zh" ? "✅ 讨论已达成共识，提前结束。" : "✅ Consensus reached, ending discussion.");
                        break;
                    }
                }
            }
            await new Promise(r => setTimeout(r, 1000));
        }
        autoActive = false;
        document.getElementById("startAutoBtn").disabled = false;
        document.getElementById("stopAutoBtn").disabled = true;
        addSystemMessage(currentLang === "zh" ? "✅ 自动讨论结束" : "✅ Auto discussion ended");
    }

    function stopAutoDiscussion() {
        autoAbort = true;
        activeControllers.forEach(c => c.abort());
        activeControllers = [];
        addSystemMessage(currentLang === "zh" ? "⏹️ 讨论已停止" : "⏹️ Stopped");
    }
    // ==================== 总结并记忆（防止重复生成） ====================
    async function summarizeAndRemember() {
        if (isSummarizing) {
            addSystemMessage(currentLang === "zh" ? "正在生成总结，请稍后再试。" : "Summary already in progress, please wait.");
            return;
        }
        isSummarizing = true;
        const btn = document.getElementById("summarizeBtn");
        const originalText = btn.innerText;
        btn.innerText = currentLang === "zh" ? "⏳ 生成中..." : "Generating...";
        btn.disabled = true;
        
        const enabled = Object.values(MODELS).filter(m => m.enabled && m.apiKey);
        if (enabled.length === 0) { 
            addSystemMessage(currentLang === "zh" ? "没有启用的模型" : "No enabled models");
            isSummarizing = false;
            btn.innerText = originalText;
            btn.disabled = false;
            return; 
        }
        addSystemMessage(currentLang === "zh" ? "📝 正在生成深度总结（含框架演进）..." : "📝 Generating deep summary with frame evolution...");
        const summaryPrompt = `请对我们刚才的整个对话进行系统性总结。严格按照以下十三个部分的顺序输出，每个部分必须包含对应标题，不得合并、跳过或更改顺序。若某部分无明显内容，请输出“(无)”。请使用Markdown格式，对重要观点、关键结论等用**粗体**标记。

1. 核心摘要（1-2句话，50字以内）
2. 核心观点（3-5条，每条1-2句话）
3. 认知框架（本次讨论形成的核心框架）
4. 深层洞察（2-3条）
5. 认知世界的帮助
6. 行动建议（2-3条具体、可执行的步骤）

13. 框架演进说明（本次讨论对既有认知框架的修正、补充或未解决的张力）`;

        let combined = "";
        for (const model of enabled) {
            try {
                const reply = await callModel(model.id, summaryPrompt, null, true, false, null, 1);
                combined += `\n\n--- ${model.color} ${model.name} ${currentLang === "zh" ? "的总结" : "summary"} ---\n${reply}`;
            } catch(e) {
                combined += `\n\n--- ${model.color} ${model.name} ${currentLang === "zh" ? "总结失败" : "failed"} ---`;
            }
        }
        if (combined.trim()) {
            let memories = JSON.parse(localStorage.getItem(MEMORY_LIST_KEY) || "[]");
            let cognitiveFrame = "", deepInsights = [], frameEvolution = "";
            const frameMatch = combined.match(/3\.\s*认知框架[：:]\s*([\s\S]*?)(?=\n\d+\.|$)/i);
            if (frameMatch) cognitiveFrame = frameMatch[1].trim();
            const insightsMatch = combined.match(/4\.\s*深层洞察[：:]\s*([\s\S]*?)(?=\n\d+\.|$)/i);
            if (insightsMatch) {
                const lines = insightsMatch[1].split(/\n/);
                deepInsights = lines.filter(l => l.trim().length > 0);
            }
            const evolutionMatch = combined.match(/13\.\s*框架演进说明[：:]\s*([\s\S]*?)$/i);
            if (evolutionMatch) frameEvolution = evolutionMatch[1].trim();
            
            const newMemory = {
                id: Date.now(),
                timestamp: new Date().toLocaleString(),
                content: combined,
                summary: combined.substring(0, 200) + "...",
                cognitiveFrame: cognitiveFrame,
                deepInsights: deepInsights,
                frameEvolution: frameEvolution,
                unresolvedTensions: [],
                relatedTo: []
            };
            memories.push(newMemory);
            localStorage.setItem(MEMORY_LIST_KEY, JSON.stringify(memories));
            addSystemMessage(`${currentLang === "zh" ? "✅ 总结已保存至记忆库 (第" : "✅ Summary saved (No."}${memories.length})`);
            addMessage("memory", combined);
        } else {
            addSystemMessage(currentLang === "zh" ? "❌ 总结失败" : "❌ Summary failed");
        }
        isSummarizing = false;
        btn.innerText = originalText;
        btn.disabled = false;
    }

    // ==================== 导出功能（使用window.print代替html2pdf） ====================
    function exportMarkdown() {
        const memories = JSON.parse(localStorage.getItem(MEMORY_LIST_KEY) || "[]");
        let content = "# Cognitive Studio Discussion Record\n\n";
        const msgs = document.querySelectorAll("#chat .message:not(.memory)");
        msgs.forEach(m => {
            const role = m.classList.contains("user") ? "User" : (m.classList.contains("ai") ? m.querySelector("strong")?.innerText || "AI" : "System");

        });
        if (memories.length) {
            content += "## Long-term Memory & Cognitive Evolution\n";
            memories.forEach((mem, idx) => {
                content += `### Memory ${idx+1} (${mem.timestamp})\n`;
                if (mem.cognitiveFrame) content += `**Cognitive Frame:** ${mem.cognitiveFrame}\n\n`;
                if (mem.frameEvolution) content += `**Frame Evolution:** ${mem.frameEvolution}\n\n`;
                content += `${mem.content}\n\n`;
            });
        }
        const blob = new Blob([content], { type: "text/markdown" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `discussion_${new Date().toISOString()}.md`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    async function smartTeam() {
        const topic = document.getElementById("topicInput").value.trim();
        if (!topic) { addSystemMessage(currentLang === "zh" ? "请先输入主题" : "Please enter a topic"); return; }
        const enabled = Object.values(MODELS).filter(m => m.enabled && m.apiKey);
        if (enabled.length < 3) { addSystemMessage(currentLang === "zh" ? "可用模型不足3个" : "Less than 3 models available"); return; }
        let judge = MODELS.deepseek;
        if (!judge.enabled || !judge.apiKey) judge = enabled[0];
        const prompt = `请根据话题“${topic}”，从以下模型中选择3个最适合讨论的，返回JSON数组（只返回数组）：${enabled.map(m => m.id).join(", ")}`;
        try {
            const reply = await callModel(judge.id, prompt, null, true, false, null, 1);
            const match = reply.match(/\[.*?\]/);
            let ids = match ? JSON.parse(match[0]) : enabled.slice(0,3).map(m => m.id);
            ids = ids.filter(id => enabled.some(m => m.id === id));
            if (ids.length < 3) ids = enabled.slice(0,3).map(m => m.id);
            document.getElementById("ai1Select").value = ids[0];
            document.getElementById("ai2Select").value = ids[1];
            document.getElementById("ai3Select").value = ids[2];
            document.querySelector('input[value="3"]').checked = true;
            document.getElementById("ai3Select").style.display = "inline-block";
            addSystemMessage(`${currentLang === "zh" ? "✅ 智能组队：" : "✅ Smart team: "}${ids.map(id => MODELS[id].name).join("、")}`);
        } catch(e) { addSystemMessage(currentLang === "zh" ? "智能组队失败" : "Smart team failed"); }
    }

    // ==================== 模型卡片渲染、配置加载等 ====================
    function renderModelCards() {
        const container = document.getElementById("modelCards");
        container.innerHTML = "";
        let list = Object.values(MODELS);
        if (modelOrder.length === list.length) {
            list = modelOrder.map(id => MODELS[id]).filter(Boolean);
        } else {
            modelOrder = list.map(m => m.id);
        }
        list.forEach(m => {
            const card = document.createElement("div");
            card.className = "model-card" + (sortMode ? " sort-mode-active" : "");
            card.dataset.id = m.id;
            card.innerHTML = `
                <h3>${m.color} ${m.name}</h3>
                <input type="text" id="${m.id}Key" placeholder="API Key" value="${escapeHtml(m.apiKey || '')}">
                <label><input type="checkbox" id="${m.id}Enable" ${m.enabled ? 'checked' : ''}> ${currentLang === "zh" ? "启用" : "Enable"}</label>
                <div class="model-desc">${m.description}</div>
                <div class="model-status" id="${m.id}Status">⚪ ${currentLang === "zh" ? "未检测" : "Not checked"}</div>
            `;
            container.appendChild(card);
        });
        if (sortMode) {
            if (!container.sortable) {
                container.sortable = new Sortable(container, {
                    animation: 150,
                    onEnd: () => {
                        modelOrder = Array.from(container.children).map(card => card.dataset.id);
                        localStorage.setItem("model_order", JSON.stringify(modelOrder));
                        updateModelSelects();
                    }
                });
            }
        } else {
            if (container.sortable) {
                container.sortable.destroy();
                delete container.sortable;
            }
        }
    }

    function updateModelSelects() {
        const enabledModels = Object.values(MODELS).filter(m => m.enabled && m.apiKey);
        const options = enabledModels.map(m => `<option value="${m.id}">${m.color} ${m.name}</option>`);
        const ai1 = document.getElementById("ai1Select");
        const ai2 = document.getElementById("ai2Select");
        const ai3 = document.getElementById("ai3Select");
        ai1.innerHTML = options.length ? options.join('') : '<option disabled>无可用模型</option>';
        ai2.innerHTML = options.length ? options.join('') : '<option disabled>无可用模型</option>';
        ai3.innerHTML = options.length ? options.join('') : '<option disabled>无可用模型</option>';
        if (enabledModels.length >= 2 && ai1.value === ai2.value) {
            ai2.selectedIndex = (ai2.selectedIndex + 1) % enabledModels.length;
        }
        if (enabledModels.length >= 3 && ai1.value === ai3.value) {
            ai3.selectedIndex = (ai3.selectedIndex + 1) % enabledModels.length;
        }
    }

    function loadSettings() {
        migrateMemoryStructure();
        const savedOrder = localStorage.getItem("model_order");
        if (savedOrder) modelOrder = JSON.parse(savedOrder);
        const savedSortMode = localStorage.getItem("sort_mode");
        if (savedSortMode) sortMode = savedSortMode === "true";
        document.getElementById("toggleSortModeBtn").innerHTML = sortMode ? "🔀 " + t("sortModeActive") : "🔀 " + t("sortModeText");
        for (let id in MODELS) {
            const key = localStorage.getItem(`${id}_key`);
            const en = localStorage.getItem(`${id}_enable`);
            if (key) MODELS[id].apiKey = key;
            if (en !== null) MODELS[id].enabled = en === 'true';
            const input = document.getElementById(`${id}Key`);
            const chk = document.getElementById(`${id}Enable`);
            if (input) input.value = MODELS[id].apiKey || '';
            if (chk) chk.checked = MODELS[id].enabled;
        }
        const topic = localStorage.getItem("last_topic");
        if (topic) document.getElementById("topicInput").value = topic;
        const purpose = localStorage.getItem("last_purpose");
        if (purpose) document.getElementById("purposeMode").value = purpose;
        const custom = localStorage.getItem(CUSTOM_MODE_KEY);
        if (custom) document.getElementById("customModeInput").value = custom;
        const rounds = localStorage.getItem("last_rounds");
        if (rounds) document.getElementById("roundsInput").value = rounds;
        const consensus = localStorage.getItem("last_consensus");
        if (consensus) document.getElementById("untilConsensusCheckbox").checked = consensus === 'true';
        const teamPerception = localStorage.getItem("team_perception");
        if (teamPerception !== null) document.getElementById("teamPerceptionCheckbox").checked = teamPerception === "true";
        const serialMode = localStorage.getItem("serial_mode");
        if (serialMode !== null) document.getElementById("serialModeCheckbox").checked = serialMode === "true";
        const cognitive = localStorage.getItem("cognitive_continuity");
        if (cognitive !== null) document.getElementById("enableCognitiveContinuity").checked = cognitive === "true";
        const conflict = localStorage.getItem("conflict_handling");
        if (conflict !== null) document.getElementById("enableConflictHandling").checked = conflict === "true";
        const selfCrit = localStorage.getItem("self_criticism");
        if (selfCrit !== null) document.getElementById("enableSelfCriticism").checked = selfCrit === "true";
        const sensitivity = localStorage.getItem("frame_sensitivity");
        if (sensitivity) document.getElementById("frameSensitivity").value = sensitivity;
        const threshold = localStorage.getItem("consensus_threshold");
        if (threshold) document.getElementById("consensusThreshold").value = threshold;
        updateTopicBar();
        updateModelSelects();
        loadAllMemories();
    }

    function saveAllKeys() {
        for (let id in MODELS) {
            const input = document.getElementById(`${id}Key`);
            const chk = document.getElementById(`${id}Enable`);
            if (input) {
                MODELS[id].apiKey = input.value.trim();
                localStorage.setItem(`${id}_key`, MODELS[id].apiKey);
            }
            if (chk) {
                MODELS[id].enabled = chk.checked;
                localStorage.setItem(`${id}_enable`, MODELS[id].enabled);
            }
        }
        const st = document.getElementById("saveStatus");
        st.innerText = "✅ " + (currentLang === "zh" ? "已保存" : "Saved");
        setTimeout(() => st.innerText = "", 2000);
        updateModelSelects();

    function clearAllKeys() {
        if (!confirm(currentLang === "zh" ? "清除所有API Key？" : "Clear all API keys?")) return;
        for (let id in MODELS) {
            MODELS[id].apiKey = "";
            localStorage.removeItem(`${id}_key`);
            const input = document.getElementById(`${id}Key`);
            if (input) input.value = "";
            MODELS[id].enabled = false;
            localStorage.setItem(`${id}_enable`, false);
            const chk = document.getElementById(`${id}Enable`);
            if (chk) chk.checked = false;
        }
        addSystemMessage(currentLang === "zh" ? "✅ 已清除所有API Key" : "✅ Cleared all keys");
        updateModelSelects();
    }

    function exportConfig() {
        const cfg = { modelOrder, sortMode, models: {}, settings: {
            topic: document.getElementById("topicInput").value,
            purpose: document.getElementById("purposeMode").value,

    function importConfig() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const cfg = JSON.parse(ev.target.result);
                    if (cfg.modelOrder) modelOrder = cfg.modelOrder;
                    if (cfg.sortMode !== undefined) sortMode = cfg.sortMode;
                    if (cfg.models) {
                        for (let id in cfg.models) {
                            if (MODELS[id]) MODELS[id].enabled = cfg.models[id].enabled;
                        }
                    }
                    if (cfg.settings) {
                        document.getElementById("topicInput").value = cfg.settings.topic || "";
                        document.getElementById("purposeMode").value = cfg.settings.purpose || "free";
                        document.getElementById("customModeInput").value = cfg.settings.customMode || "";
                        document.getElementById("roundsInput").value = cfg.settings.rounds || 3;
                        document.getElementById("untilConsensusCheckbox").checked = !!cfg.settings.untilConsensus;
                        if (cfg.settings.teamPerception !== undefined) document.getElementById("teamPerceptionCheckbox").checked = cfg.settings.teamPerception;
                        if (cfg.settings.serialMode !== undefined) document.getElementById("serialModeCheckbox").checked = cfg.settings.serialMode;
                        if (cfg.settings.cognitiveContinuity !== undefined) document.getElementById("enableCognitiveContinuity").checked = cfg.settings.cognitiveContinuity;
                        if (cfg.settings.conflictHandling !== undefined) document.getElementById("enableConflictHandling").checked = cfg.settings.conflictHandling;
                        if (cfg.settings.selfCriticism !== undefined) document.getElementById("enableSelfCriticism").checked = cfg.settings.selfCriticism;
                        if (cfg.settings.frameSensitivity) document.getElementById("frameSensitivity").value = cfg.settings.frameSensitivity;
                        if (cfg.settings.consensusThreshold) document.getElementById("consensusThreshold").value = cfg.settings.consensusThreshold;
                    }
                    renderModelCards();
                    updateModelSelects();
                    updateTopicBar();
                    addSystemMessage(currentLang === "zh" ? "✅ 配置导入成功" : "✅ Config imported");
                } catch (err) {
                    addSystemMessage(currentLang === "zh" ? "❌ 配置文件解析失败" : "❌ Parse failed");
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    async function healthCheckAll() {
        for (let id in MODELS) {
            const m = MODELS[id];
            const statusDiv = document.getElementById(`${id}Status`);
            if (!m.enabled || !m.apiKey) {
                if (statusDiv) statusDiv.innerHTML = "⚪ " + (currentLang === "zh" ? "未启用" : "Disabled");
                continue;
            }
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                const messages = [{ role: "user", content: "ping" }];
                const response = await fetch(PROXY_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ modelId: id, apiKey: m.apiKey, messages, modelName: m.model, stream: false }),
                    signal: controller.signal
                });
                clearTimeout(timeout);
                if (response.ok) {
                    statusDiv.innerHTML = "🟢 " + (currentLang === "zh" ? "健康" : "Healthy");
                    statusDiv.className = "model-status healthy";
                } else {
                    statusDiv.innerHTML = "🔴 " + (currentLang === "zh" ? "不可用" : "Unavailable");
                    statusDiv.className = "model-status unhealthy";
                }
            } catch (e) {
                statusDiv.innerHTML = "🔴 " + (currentLang === "zh" ? "不可用" : "Unavailable");
                statusDiv.className = "model-status unhealthy";
            }
        }
    }

    function initGuide() {
        if (localStorage.getItem("guide_shown")) return;
        const guide = document.getElementById("guideOverlay");
        guide.style.display = "flex";
        let step = 0;
        const steps = [t("guide.text"), t("guide.step1"), t("guide.step2"), t("guide.step3"), t("guide.step4")];
        const guideTitle = document.getElementById("guideTitle");
        const guideText = document.getElementById("guideText");
        const guideCounter = document.getElementById("guideCounter");
        const guideNext = document.getElementById("guideNextBtn");
        const guideSkip = document.getElementById("guideSkipBtn");
        const guideLang = document.getElementById("guideLangBtn");
        guideTitle.innerText = t("guide.title");
        guideText.innerText = steps[0];
        guideCounter.innerText = `1/${steps.length}`;
        function updateGuideLang() {
            guideTitle.innerText = t("guide.title");
            steps[0] = t("guide.text");
            steps[1] = t("guide.step1");
            steps[2] = t("guide.step2");
            steps[3] = t("guide.step3");
            steps[4] = t("guide.step4");
            guideText.innerText = steps[step];
            guideCounter.innerText = `${step+1}/${steps.length}`;
            guideNext.innerText = t("guide.next");
            guideSkip.innerText = t("guide.skip");
            guideLang.innerText = t("guide.langBtn");
        }
        guideLang.onclick = () => {
            currentLang = currentLang === "zh" ? "en" : "zh";
            localStorage.setItem("app_lang", currentLang);
            updateUI();
            updateGuideLang();
        };
        guideNext.onclick = () => {
            step++;
            if (step >= steps.length) {
                guide.style.display = "none";
                localStorage.setItem("guide_shown", "true");
                return;
            }
            guideText.innerText = steps[step];
            guideCounter.innerText = `${step+1}/${steps.length}`;
        };
        guideSkip.onclick = () => {
            guide.style.display = "none";
            localStorage.setItem("guide_shown", "true");
        };
    }

    function init() {
        updateUI();
        renderModelCards();
        loadSettings();
        bindEvents();
        scrollToBottom();
        initGuide();
        healthCheckAll();
        setInterval(healthCheckAll, 300000);
    }

    init();

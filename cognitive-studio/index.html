        <button id="importConfigBtn" style="background:#2c5a6e;">📥 <span id="importText">导入配置</span></button>
        <button id="clearAllKeysBtn" style="background:#c0392b;">🗑️ <span id="clearKeysText">清除所有API Key</span></button>
        <button id="langSwitchBtn" class="lang-switch" style="background:#555;">🌐 <span id="langBtnText">English</span></button>
        <span id="saveStatus"></span>
    </div>
    <div class="model-config" id="modelCards"></div>
    <button id="saveKeysBtn"><span id="saveKeysText">保存所有API Key</span></button>
</div>

<div id="topicBar" class="topic-bar">💡 <span id="topicPrefix">当前讨论主题：</span><span id="topicValue">未设置</span></div>
<div id="chat"></div>
<button id="scrollBottomBtn" class="scroll-bottom-btn" title="Scroll to bottom">↓</button>

<div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息，所有启用的AI会同时回复...">
    <button id="sendBtn"><span id="sendText">发送</span></button>
    <button id="continueBtn" style="background:#2c5a6e;">✍️ <span id="continueText">继续</span></button>
    <button id="uploadBtn" style="background:#f39c12;">📎 <span id="uploadText">上传附件</span></button>
    <button id="clearLastAttachmentBtn" style="background:#e67e22;">🗑️ <span id="clearAttachText">清除最后附件影响</span></button>
    <button id="cnkiBtn" style="background:#2c5a6e;">📚 <span id="cnkiText">知网增强</span></button>
    <button id="summarizeBtn" style="background:#2c5a6e;">📝 <span id="summarizeText">总结并记忆</span></button>
    <span class="help-icon" id="summaryHelp">?</span>
    <button id="openMemoryBtn" style="background:#8e44ad;">📚 <span id="memoryBtnText">记忆库</span></button>
    <button id="exportMarkdownBtn" style="background:#16a085;">📄 <span id="exportMdText">导出MD</span></button>
    <button id="exportPdfBtn" style="background:#c0392b;">📑 <span id="exportPdfText">导出PDF</span></button>
    <button id="clearKeepMemoryBtn" style="background:#c0392b;">🗑️ <span id="clearKeepText">清空对话(保留记忆)</span></button>
</div>
<input type="file" id="fileInput" style="display:none" accept=".txt,.md,.csv,.json,.docx,.xlsx,.xls">

<div class="auto-area">
    <div class="discuss-mode">
        <span id="discussPeopleLabel">讨论人数：</span>
        <label><input type="radio" name="discussCount" value="2" checked> <span id="twoPeople">2人</span></label>
        <label><input type="radio" name="discussCount" value="3"> <span id="threePeople">3人</span></label>
    </div>
    <select id="ai1Select"></select>
    <select id="ai2Select"></select>
    <select id="ai3Select" style="display:none"></select>
    <select id="purposeMode" class="mode-select"></select>
    <div id="roleplayInputs" class="roleplay-inputs">
        <input type="text" id="roleA" placeholder="角色A (例如: 牛顿)" style="flex:1;">
        <input type="text" id="roleB" placeholder="角色B (例如: 爱因斯坦)" style="flex:1;">
        <div style="display: flex; gap: 5px;">
            <button class="role-preset" data-a="牛顿" data-b="爱因斯坦">🧠 牛顿 vs 爱因斯坦</button>
            <button class="role-preset" data-a="孔子" data-b="苏格拉底">🌍 孔子 vs 苏格拉底</button>
            <button class="role-preset" data-a="乔布斯" data-b="马斯克">💡 乔布斯 vs 马斯克</button>
        </div>
    </div>
    <input type="text" id="customModeInput" class="custom-mode-input" placeholder="自定义指令..." style="display:none; flex:1;">
    <input type="text" id="topicInput" placeholder="讨论主题" style="flex:2;" oninput="updateTopicBar()">
    <input type="number" id="roundsInput" placeholder="轮数" value="3" min="1" max="20" style="width: 80px;">
    <label><input type="checkbox" id="untilConsensusCheckbox"> <span id="untilConsensusText">直到共识</span></label>
    <select id="consensusSensitivity" style="width: auto;">
        <option value="loose"><span id="looseText">宽松</span></option>
        <option value="medium" selected><span id="mediumText">标准</span></option>
        <option value="strict"><span id="strictText">严格</span></option>
    </select>
    <button id="startAutoBtn"><span id="startAutoText">开始自动讨论</span></button>
    <button id="stopAutoBtn" disabled><span id="stopAutoText">停止</span></button>
    <button id="smartTeamBtn" style="background:#8e44ad;">🧠 <span id="smartTeamText">智能组队讨论</span></button>
</div>

<div id="memoryModal" class="modal">
    <div class="modal-content">
        <h3 id="memoryModalTitle">记忆库</h3>
        <input type="text" id="memorySearch" class="search-box" placeholder="搜索关键词...">
        <div id="memoryList"></div>
        <button id="closeMemoryModal"><span id="closeModalText">关闭</span></button>
    </div>
</div>

                for (let id in config) {
                    if (models[id]) {
                        models[id].apiKey = config[id].apiKey || "";
                        models[id].enabled = config[id].enabled !== undefined ? config[id].enabled : false;

        if (extraClass) className += ` ${extraClass}`;
        if (role === "ai") {
            if (modelName.includes("DeepSeek")) className += ` ai-deepseek`;
            else if (modelName.includes("Gemini")) className += ` ai-gemini`;
            else if (modelName.includes("Cohere")) className += ` ai-cohere`;
            else if (modelName.includes("Grok")) className += ` ai-grok`;
            else if (modelName.includes("Perplexity")) className += ` ai-perplexity`;
            else if (modelName.includes("Claude")) className += ` ai-claude`;
            else if (modelName.includes("豆包 (APIYI)")) className += ` ai-doubao`;
            else if (modelName.includes("火山豆包")) className += ` ai-volcano`;
            else if (modelName.includes("火山方舟")) className += ` ai-fangzhou`;
            else if (modelName.includes("Doubao-2.0-Pro")) className += ` ai-doubaopro`;
            else if (modelName.includes("OpenAI")) className += ` ai-openai`;
        }
        msgDiv.className = className;
        msgDiv.id = `msg-${msgId}`;
        let inner = "";
        if (role === "ai") inner = `<strong>${modelName}:</strong><br>${content}`;
        else if (role === "system") inner = content.replace(/\n/g,"<br>");
        else if (role === "memory") inner = `<strong>🧠 记忆加载：</strong><br>${content.replace(/\n/g,"<br>")}`;
        else if (role === "attachment") inner = `<strong>📎 附件材料：</strong><br>${content.replace(/\n/g,"<br>")}`;
        else inner = content.replace(/\n/g,"<br>");
        const delSpan = `<span class="delete-msg" data-id="${msgId}">🗑️</span>`;
        msgDiv.innerHTML = inner + delSpan;
        chatDiv.appendChild(msgDiv);
        msgDiv.querySelector('.delete-msg').addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm("删除此消息？")) {
                msgDiv.remove();
                let idx = globalHistory.findIndex(h => h.content === content && h.role === (role==="user"?"user":"assistant"));
                if (idx !== -1) globalHistory.splice(idx,1);
            }
        });
        const clearDiv = document.createElement("div"); clearDiv.className = "clear";
        chatDiv.appendChild(clearDiv);

        if (role !== "system" && role !== "memory" && role !== "attachment") {
            globalHistory.push({ role: role==="user"?"user":"assistant", content, model: modelName || undefined });
            if (role === "ai") lastAIMessage = { modelId: modelName.split(' ')[0].toLowerCase(), modelFull: modelName, content };
        }
        cleanOldMessages();
        return msgId;
    }

    async function callModel(modelId, prompt) {
        const m = models[modelId];
        if (!m.enabled || !m.apiKey) throw new Error(`${m.name} 未启用`);
        // 增强格式检查
        if (modelId === "deepseek" && !m.apiKey.startsWith("sk-")) {
            throw new Error("DeepSeek API Key 格式错误，应以 'sk-' 开头，请重新复制完整 Key。");
        }
        if (modelId === "volcano" && m.apiKey.length < 32) {
            throw new Error("火山引擎 API Key 格式错误，应为 UUID 格式，请从控制台 API Key 管理获取。");
        }
        const history = globalHistory.slice(-100).map(h => ({ role: h.role, content: h.model ? `【${h.model}说】：${h.content}` : h.content }));
        const systemMsg = { role: "system", content: getSystemPrompt() };
        const messages = [systemMsg, ...history.map(h => ({ role: h.role, content: h.content })), { role: "user", content: prompt }];
        const options = {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${m.apiKey}` },
            body: JSON.stringify({ model: m.model, messages, temperature: 0.7, max_tokens: 8192 })
        };
        if (m.id === "grok" || m.id === "claude") {
            options.headers["HTTP-Referer"] = "http://localhost";
            options.headers["X-Title"] = "Multi-AI Chat";
        }
        try {
            const resp = await fetch(m.url, options);
            const data = await resp.json();
            if (data.error) throw new Error(data.error.message);
            let content = data.choices[0].message.content;
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            content = content.replace(/^(\d+\.\s+)(.*?)$/gm, '<span class="list-item">$1$2</span>');
            content = content.replace(/^(\-\s+)(.*?)$/gm, '<span class="list-item">$1$2</span>');
            return content;
        } catch (e) {
            let friendlyMsg = `❌ ${m.name} 调用失败：`;
            if (e.message.includes("API Key")) friendlyMsg += "请检查 API Key 是否正确填写。";
            else if (e.message.includes("network") || e.message.includes("fetch")) friendlyMsg += "网络连接异常，请检查网络或代理设置。";
            else if (e.message.includes("rate limit") || e.message.includes("429")) friendlyMsg += "请求过于频繁，请稍后再试。";
            else if (e.message.includes("balance") || e.message.includes("insufficient")) friendlyMsg += "账户余额不足，请充值后重试。";
            else friendlyMsg += e.message;
            throw new Error(friendlyMsg);
        }
    }
    // ==================== 共识判断（完整版） ====================
    async function checkConsensus(modelIds, topic, currentRound) {
        const enabledModels = Object.values(models).filter(m => m.enabled && m.apiKey);
        if (enabledModels.length === 0) return false;
        // 获取最近讨论历史（最近10条消息）
        const recentHistory = globalHistory.slice(-10).map(m => `${m.role === 'user' ? '用户' : (m.model || '系统')}：${m.content.substring(0,200)}`).join('\n');
        const prompt = `请判断当前讨论是否应该结束。判断标准：
1. 所有参与者是否已达成明确一致观点？
2. 连续两轮是否未出现新论点或新证据？
3. 讨论是否已陷入重复循环（相同观点反复陈述无新推进）？

请返回JSON格式：{"consensus": true/false, "confidence": 0-10, "reasons": "简短理由"}
讨论主题：${topic}
当前轮次：${currentRound}
最近讨论内容：
${recentHistory}`;

        // 使用所有启用的模型作为裁判（排除Perplexity避免联网消耗）
        const judgeModels = enabledModels.filter(m => m.id !== "perplexity");
        if (judgeModels.length === 0) judgeModels.push(enabledModels[0]);
        const results = await Promise.allSettled(judgeModels.map(m => m.call(prompt, [])));
        let votes = { yes: 0, no: 0, total: 0 };
        let confidences = { yes: 0, no: 0 };
        let reasons = [];
        for (let res of results) {
            if (res.status === "fulfilled") {
                try {
                    const text = res.value;
                    const jsonMatch = text.match(/\{.*\}/s);
                    if (jsonMatch) {
                        const obj = JSON.parse(jsonMatch[0]);
                        const consensus = obj.consensus === true;
                        const conf = Math.min(10, Math.max(0, parseInt(obj.confidence) || 0));
                        if (consensus) {
                            votes.yes++;
                            confidences.yes += conf;
                        } else {
                            votes.no++;
                            confidences.no += conf;
                        }
                        if (obj.reasons) reasons.push(obj.reasons);
                        votes.total++;
                    } else {
                        if (text.toLowerCase().includes("是") || text.toLowerCase().includes("yes")) votes.yes++;
                        else votes.no++;
                        votes.total++;
                    }
                } catch(e) { console.warn(e); }
            }
        }
        if (votes.total === 0) return false;
        const sensitivity = document.getElementById("consensusSensitivity").value;
        let threshold = 0.5;
        if (sensitivity === "loose") threshold = 0.5;
        else if (sensitivity === "medium") threshold = 0.6;
        else threshold = 0.8;
        const yesRatio = votes.yes / votes.total;
        const avgConf = votes.yes > 0 ? confidences.yes / votes.yes : 0;
        let shouldStop = false;
        if (votes.total === 2) shouldStop = votes.yes === 2;
        else shouldStop = yesRatio >= threshold && avgConf >= 5;
        // 记录决策日志
        const log = {
            timestamp: new Date().toISOString(),
            round: currentRound,
            votes: { yes: votes.yes, no: votes.no, total: votes.total },
            yesRatio,
            avgConf,
            sensitivity,
            shouldStop,
            reasons: reasons.slice(0,3)
        };
        let logs = JSON.parse(localStorage.getItem(CONSENSUS_LOG_KEY) || "[]");
        logs.push(log);
        localStorage.setItem(CONSENSUS_LOG_KEY, JSON.stringify(logs.slice(-50)));
        return shouldStop;
    }

    // ==================== 自动讨论（完整版，含共识判断） ====================
    async function startAutoDiscussion() {
        if (autoActive) { addMessage("system","已有讨论进行中"); return; }
        const mode = document.querySelector('input[name="discussCount"]:checked').value;
        const ai1 = document.getElementById("ai1Select");
        const ai2 = document.getElementById("ai2Select");
        const ai3 = document.getElementById("ai3Select");
        let modelIds = [ai1.value, ai2.value];
        if (mode === "3") {
            ai3.style.display = "inline-block";
            modelIds.push(ai3.value);
        } else {
            ai3.style.display = "none";
        }
        if (modelIds.some(v => !v || v === "无可用模型")) { addMessage("system","请选择有效模型"); return; }
        const topic = document.getElementById("topicInput").value.trim();
        if (!topic) { addMessage("system","请输入讨论主题"); return; }
        let rounds = parseInt(document.getElementById("roundsInput").value);
        if (isNaN(rounds)) rounds = 3;
        const untilConsensus = document.getElementById("untilConsensusCheckbox").checked;
        const purpose = document.getElementById("purposeMode").value;
        let custom = "";
        let roleA = "", roleB = "";
        if (purpose === "custom") {
            custom = document.getElementById("customModeInput").value.trim();
            localStorage.setItem(CUSTOM_MODE_KEY, custom);
        } else if (purpose === "roleplay") {
            roleA = document.getElementById("roleA").value.trim();
            roleB = document.getElementById("roleB").value.trim();
            if (!roleA || !roleB) { addMessage("system","请填写角色A和角色B"); return; }
        }

        autoActive = true; autoAbort = false;
        document.getElementById("startAutoBtn").disabled = true;
        document.getElementById("stopAutoBtn").disabled = false;
        document.getElementById("sendBtn").disabled = true;
        document.getElementById("userInput").disabled = true;

        let round = 1;
        let index = 0;
        let consensusReached = false;

        while ((round <= rounds || (untilConsensus && !consensusReached)) && !autoAbort) {
            const currentId = modelIds[index];
            const currentModel = models[currentId];
            let modeInstruction = "";
            if (round === 1 && index === 0) {
                // 第一轮提示
                if (purpose === "roleplay") {
                    modeInstruction = `请开始角色扮演对话。主题：${topic}\n\n角色A（${roleA}）首先发言。请${currentModel.name}扮演${roleA}，以该角色的身份、语言风格和知识背景发表观点。`;
                } else if (purpose === "custom") {
                    modeInstruction = `请对主题“${topic}”进行初步分析。${custom ? `额外要求：${custom}` : ''}`;
                } else if (purpose === "factFinding") {
                    modeInstruction = `请针对问题“${topic}”给出最直接、准确的答案，并附上关键依据。其他AI可先倾听。`;
                } else if (purpose === "personalGrowth") {
                    modeInstruction = `请以个人成长顾问的身份，针对用户的问题“${topic}”，从多个维度（如学习、实践、心态、健康）提出具体、可操作的建议。`;
                } else {
                    const modeMap = {
                        free: "请对主题进行自由讨论。", critical: "请以批判性分析的角度，重点找出问题、漏洞、矛盾，提出有力质疑。",
                        constructive: "请以建设性建议的角度，提出切实可行的改进方案或行动建议。", debate: "请以辩论的形式，发表你的观点，为后续辩论做好准备。",
                        summary: "请以总结提炼的角度，进行初步归纳，指出核心要点。", academic: "请以学术深度角度进行分析，强调理论依据，引用经典，使用专业术语。",
                        simple: "请以通俗易懂的角度，用比喻、生活案例、简单语言解释。", cross: "请以跨文化比较的角度，对比不同文化、地域、历史背景下的理解或表现。",
                        creative: "请以创意发散的角度，提出奇思妙想、突破常规的新概念或新方向。"
                    };
                    let base = modeMap[purpose] || "请对主题进行初步分析。";
                    modeInstruction = base.replace("主题", topic);
                }
            } else {
                // 后续轮次：根据模式定制持续导向
                if (purpose === "roleplay") {
                    const isRoleA = (round % 2 === 1 && index === 0) || (round % 2 === 0 && index === 1);
                    const currentRole = isRoleA ? roleA : roleB;
                    modeInstruction = `请基于以上所有讨论，继续角色扮演对话。请${currentModel.name}扮演${currentRole}，以该角色的身份回应上一位发言者。${custom ? ` 额外要求：${custom}` : ''}`;
                } else if (purpose === "custom") {
                    modeInstruction = `请基于以上所有讨论，发表你的看法。你可以赞同、反驳、补充或提出新视角。${custom ? ` 额外要求：${custom}` : ''}`;
                } else if (purpose === "factFinding") {
                    modeInstruction = `请基于以上所有讨论，若答案已明确则不再补充；若有新事实请简要说明，否则结束。`;
                } else if (purpose === "personalGrowth") {
                    modeInstruction = `请基于以上所有讨论，继续从个人成长角度补充建议，或对已有建议进行细化。`;
                } else {
                    const modeMap = {
                        free: "请基于以上所有讨论，自由发表你的看法。", critical: "请以批判性分析的角度回应，重点指出问题、漏洞或矛盾。",
                        constructive: "请以建设性建议的角度回应，提出改进方案或行动建议。", debate: "请继续辩论，维护或反驳对方观点。",
                        summary: "请以总结提炼的角度回应，归纳整合各方观点。", academic: "请以学术深度角度回应，强调理论依据和引用。",
                        simple: "请以通俗易懂的角度回应，用简单语言和比喻。", cross: "请以跨文化比较的角度回应，对比不同文化背景。",
                        creative: "请以创意发散的角度回应，提出新颖观点。"
                    };
                    modeInstruction = modeMap[purpose] || "请基于以上所有讨论，发表你的看法。";
                }
            }
            addMessage("system", `📢 第${round}轮，${currentModel.name} 发言`);
            try {
                await callModel(currentId, modeInstruction);
            } catch(e) { 
                addMessage("system",`❌ ${currentModel.name} 发言失败: ${e.message}`);
            }
            index = (index+1) % modelIds.length;
            if (index === 0) {
                round++;
                if (untilConsensus && round > rounds) {
                    const shouldStop = await checkConsensus(modelIds, topic, round-1);
                    if (shouldStop) {
                        const userChoice = confirm("AI认为讨论已可结束，是否继续？\n\n点击“确定”结束讨论，点击“取消”继续讨论。");
                        if (userChoice) {
                            consensusReached = true;
                            break;
                        } else {
                            rounds++;
                        }
                    }
                }
            }
            await new Promise(r => setTimeout(r, 1000));
        }
        if (autoAbort) addMessage("system","⏹️ 讨论停止");
        else addMessage("system","✅ 自动讨论结束");
        autoActive = false;
        document.getElementById("startAutoBtn").disabled = false;
        document.getElementById("stopAutoBtn").disabled = true;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("userInput").disabled = false;
    }

    // ==================== 智能组队 ====================
    async function smartTeam() {
        const topic = document.getElementById("topicInput").value.trim();
        if (!topic) { addMessage("system","请先输入主题"); return; }
        const enabled = Object.values(models).filter(m => m.enabled && m.apiKey);
        if (enabled.length < 3) { addMessage("system","可用模型不足3个"); return; }
        let judge = models.deepseek;
        if (!judge.enabled || !judge.apiKey) judge = enabled.find(m => m.id !== "deepseek");
        if (!judge) { addMessage("system","无裁判模型"); return; }
        const info = enabled.map(m => `- ${m.color} ${m.name}: ${m.description}`).join("\n");
        const prompt = `请根据话题“${topic}”，从以下模型中选择3个最适合讨论的，返回JSON数组：${info}`;
        try {
            const reply = await judge.call(prompt, []);
            const match = reply.match(/\[.*?\]/s);
            let ids = match ? JSON.parse(match[0]) : enabled.slice(0,3).map(m=>m.id);
            ids = ids.filter(id => enabled.some(m=>m.id===id));
            if (ids.length<3) ids = enabled.slice(0,3).map(m=>m.id);
            const [a1,a2,a3] = ids;
            document.getElementById("ai1Select").value = a1;
            document.getElementById("ai2Select").value = a2;
            document.getElementById("ai3Select").value = a3;
            document.querySelector('input[value="3"]').checked = true;
            document.getElementById("ai3Select").style.display = "inline-block";
            addMessage("system",`✅ 智能组队：${ids.map(id=>models[id].name).join("、")}`);
            await startAutoDiscussion();
        } catch(e) { addMessage("system","智能组队失败"); }
    }

    // ==================== 十二部分总结指令 ====================
    const SUMMARY_PROMPT = `请对我们刚才的整个对话进行系统性总结。严格按照以下十二个部分的顺序输出，每个部分必须包含对应标题，不得合并、跳过或更改顺序。若某部分无明显内容，请输出“(无)”。请使用Markdown格式，对重要观点、关键结论等用**粗体**标记。

1. 核心摘要（1-2句话，50字以内）  
2. 核心观点（3-5条，每条1-2句话）  
3. 认知框架  
4. 深层洞察（2-3条）  
5. 认知世界的帮助  
6. 行动建议（2-3条具体、可执行的步骤）  
7. 未竟之处与后续方向（1-3个方向）  
8. 关键引用/金句（可选，1-2句）  
9. 文笔与语言风格  
10. 知识局限与认知缺口  
11. 情感基调与氛围  
12. 可视化元素建议`;

    async function summarizeAndRemember() {
        const enabled = Object.values(models).filter(m => m.enabled && m.apiKey);
        if (enabled.length === 0) { addMessage("system","没有启用的模型"); return; }
        addMessage("system","📝 正在生成十二部分深度总结...");
        const results = await Promise.allSettled(enabled.map(m => callModel(m.id, SUMMARY_PROMPT)));
        let combined = "";
        for (let i=0; i<results.length; i++) {
            const res = results[i];
            if (res.status === "fulfilled") combined += `\n\n--- ${enabled[i].color} ${enabled[i].name} 的总结 ---\n${res.value}`;
            else combined += `\n\n--- ${enabled[i].color} ${enabled[i].name} 总结失败 ---`;
        }
        if (combined.trim()) {
            let memories = JSON.parse(localStorage.getItem(MEMORY_LIST_KEY) || "[]");
            const newMemory = {
                id: Date.now(),
                timestamp: new Date().toLocaleString(),
                content: combined,
                summary: combined.substring(0, 200) + "..."
            };
            memories.push(newMemory);
            localStorage.setItem(MEMORY_LIST_KEY, JSON.stringify(memories));
            addMessage("system",`✅ 总结已保存至记忆库 (第${memories.length}条)`);
            addMessage("memory", `【记忆 ${memories.length}】\n${combined}`);
        } else addMessage("system","❌ 总结失败");
    }

    function loadAllMemories() {
        const memories = JSON.parse(localStorage.getItem(MEMORY_LIST_KEY) || "[]");
        const recent = memories.slice(-10);
        recent.forEach((mem, idx) => {
            addMessage("memory", `【记忆 ${memories.length - (recent.length - idx)}】\n${mem.content}`);
        });
    }

    function renderMemoryList(filter = "") {
        const memories = JSON.parse(localStorage.getItem(MEMORY_LIST_KEY) || "[]");
        const listDiv = document.getElementById("memoryList");
        if (memories.length === 0) {
            listDiv.innerHTML = "<div>暂无记忆，请先进行总结并记忆。</div>";
            return;
        }
        const filtered = filter.trim() === "" ? memories : memories.filter(m => m.content.includes(filter) || m.summary.includes(filter));
        listDiv.innerHTML = filtered.map((mem, idx) => `
            <div class="memory-item">
                <h4>记忆 #${memories.indexOf(mem)+1} (${mem.timestamp})</h4>
                <pre style="white-space:pre-wrap">${mem.content.substring(0, 500)}${mem.content.length>500?"...":""}</pre>
                <div class="memory-actions">
                    <button data-id="${mem.id}" class="view-full-btn">查看完整</button>
                    <button data-id="${mem.id}" class="delete-memory">删除</button>
                </div>
            </div>
        `).join("");
        document.querySelectorAll(".view-full-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                const mem = memories.find(m => m.id === id);
                if (mem) showFullContent(mem.content);
            });
        });
        document.querySelectorAll(".delete-memory").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm("删除此记忆？")) {
                    const newMemories = memories.filter(m => m.id !== id);
                    localStorage.setItem(MEMORY_LIST_KEY, JSON.stringify(newMemories));
                    renderMemoryList(document.getElementById("memorySearch").value);
                    location.reload();
                }
            });
        });
    }

    function openMemoryModal() {
        const modal = document.getElementById("memoryModal");
        renderMemoryList("");
        modal.style.display = "flex";
        const searchInput = document.getElementById("memorySearch");
        const handler = () => renderMemoryList(searchInput.value);
        searchInput.addEventListener("input", handler);
        searchInput.removeEventListener("input", handler);
        searchInput.addEventListener("input", handler);
    }
    function showFullContent(content) {
        const modal = document.getElementById("fullContentModal");
        document.getElementById("fullContentText").textContent = content;
        modal.style.display = "flex";
    }

    function exportMarkdown() {
        const memories = JSON.parse(localStorage.getItem(MEMORY_LIST_KEY) || "[]");
        let content = "# 认知增强工作室讨论记录\n\n";
        const msgs = document.querySelectorAll("#chat .message:not(.memory)");
        msgs.forEach(m => {
            const role = m.classList.contains("user") ? "用户" : (m.classList.contains("ai") ? m.querySelector("strong")?.innerText || "AI" : "系统");
            let text = m.innerText.replace(/🗑️/g,"").trim();
            content += `### ${role}\n${text}\n\n`;
        });
        if (memories.length) {
            content += "## 长期记忆\n";
            memories.forEach((mem, idx) => {
                content += `### 记忆 ${idx+1} (${mem.timestamp})\n${mem.content}\n\n`;
            });
        }
        const blob = new Blob([content], {type:"text/markdown"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `讨论记录_${new Date().toISOString()}.md`;
        a.click();
        URL.revokeObjectURL(a.href);
    }
    function exportPdf() {
        const element = document.createElement("div");
        element.innerHTML = `<h2>讨论记录</h2>${document.getElementById("chat").innerHTML}`;
        html2pdf().from(element).save();
    }

    function updateTopicBar() {
        document.getElementById("topicValue").innerText = document.getElementById("topicInput").value.trim() || (currentLang === "zh" ? "未设置" : "Not set");
    }

    // ==================== 事件绑定 ====================
    document.getElementById("uploadBtn").onclick = () => document.getElementById("fileInput").click();
    document.getElementById("fileInput").onchange = (e) => { if(e.target.files.length) addMessage("system","附件上传功能已就绪"); };
    document.getElementById("cnkiBtn").onclick = () => { const kw = prompt("关键词"); const txt = prompt("粘贴摘要"); if(kw && txt) addMessage("attachment", `【知网学术参考】关键词:${kw}\n${txt}`); };
    document.getElementById("clearLastAttachmentBtn").onclick = () => { const last = document.querySelector(".message.attachment:last-child"); if(last) last.remove(); };
    document.getElementById("clearKeepMemoryBtn").onclick = () => { if(confirm("清空普通对话，保留记忆？")) location.reload(); };
    document.getElementById("continueBtn").onclick = async () => { if(lastAIMessage) await callModel(lastAIMessage.modelId, "请继续完成上一条回复。"); else addMessage("system","无可继续的消息"); };
    document.getElementById("sendBtn").onclick = async () => { const txt = document.getElementById("userInput").value; if(!txt) return; addMessage("user",txt); document.getElementById("userInput").value=""; for(let m of Object.values(models)) if(m.enabled && m.apiKey) await callModel(m.id, txt); };
    document.getElementById("saveKeysBtn").onclick = saveSettings;
    document.getElementById("summarizeBtn").onclick = summarizeAndRemember;
    document.getElementById("openMemoryBtn").onclick = openMemoryModal;
    document.getElementById("exportMarkdownBtn").onclick = exportMarkdown;
    document.getElementById("exportPdfBtn").onclick = exportPdf;
    document.getElementById("startAutoBtn").onclick = startAutoDiscussion;
    document.getElementById("stopAutoBtn").onclick = () => { autoActive = false; autoAbort = true; };
    document.getElementById("smartTeamBtn").onclick = smartTeam;
    document.getElementById("closeMemoryModal").onclick = () => document.getElementById("memoryModal").style.display = "none";
    document.getElementById("closeFullModal").onclick = () => document.getElementById("fullContentModal").style.display = "none";
    document.getElementById("fullContentModal").addEventListener("click", (e) => { if(e.target === document.getElementById("fullContentModal")) document.getElementById("fullContentModal").style.display = "none"; });
    document.getElementById("exportConfigBtn").onclick = exportConfig;
    document.getElementById("importConfigBtn").onclick = () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = (e) => { if(e.target.files[0]) importConfig(e.target.files[0]); };
        input.click();
    };
    document.getElementById("clearAllKeysBtn").onclick = clearAllKeys;
    document.getElementById("langSwitchBtn").onclick = () => {
        currentLang = currentLang === "zh" ? "en" : "zh";
        localStorage.setItem("app_lang", currentLang);
        updateUI();
        addMessage("system", currentLang === "zh" ? "界面已切换为中文" : "Language switched to English");
    };
    document.querySelectorAll(".role-preset").forEach(btn => {
        btn.addEventListener("click", () => {
            const a = btn.dataset.a;
            const b = btn.dataset.b;
            document.getElementById("roleA").value = a;
            document.getElementById("roleB").value = b;
            addMessage("system",`✅ 已预设角色：${a} 和 ${b}`);
        });
    });
    document.getElementById("purposeMode").addEventListener("change", function() {
        const customInput = document.getElementById("customModeInput");
        const roleplayInputs = document.getElementById("roleplayInputs");
        if (this.value === "custom") {
            customInput.classList.add("active");
            customInput.style.display = "block";
            roleplayInputs.classList.remove("active");
            roleplayInputs.style.display = "none";
        } else if (this.value === "roleplay") {
            roleplayInputs.classList.add("active");
            roleplayInputs.style.display = "flex";
            customInput.classList.remove("active");
            customInput.style.display = "none";
        } else {
            customInput.classList.remove("active");
            customInput.style.display = "none";
            roleplayInputs.classList.remove("active");
            roleplayInputs.style.display = "none";
        }
    });
    const radios = document.querySelectorAll('input[name="discussCount"]');
    function toggleThirdSelect() {
        const mode = document.querySelector('input[name="discussCount"]:checked').value;
        document.getElementById("ai3Select").style.display = mode === "3" ? "inline-block" : "none";
    }
    radios.forEach(r => r.addEventListener("change", toggleThirdSelect));
    toggleThirdSelect();

    // 初始化问号提示
    const summaryHelp = document.getElementById("summaryHelp");
    let tooltipDiv = null;
    summaryHelp.addEventListener("mouseenter", (e) => {
        if (tooltipDiv) tooltipDiv.remove();
        tooltipDiv = document.createElement("div");
        tooltipDiv.className = "tooltip";
        tooltipDiv.innerHTML = `<strong>十二部分总结</strong><br>1.核心摘要 2.核心观点 3.认知框架 4.深层洞察 5.认知世界的帮助 6.行动建议 7.未竟之处 8.关键引用 9.文笔与语言风格 10.知识局限 11.情感基调 12.可视化建议`;
        document.body.appendChild(tooltipDiv);
        const rect = summaryHelp.getBoundingClientRect();
        tooltipDiv.style.left = rect.left + "px";
        tooltipDiv.style.top = (rect.bottom + 5) + "px";
    });
    summaryHelp.addEventListener("mouseleave", () => { if(tooltipDiv) tooltipDiv.remove(); });
    if (window.matchMedia("(max-width: 768px)").matches) {
        summaryHelp.addEventListener("click", () => alert("十二部分总结：\n1.核心摘要\n2.核心观点\n3.认知框架\n4.深层洞察\n5.认知世界的帮助\n6.行动建议\n7.未竟之处\n8.关键引用\n9.文笔与语言风格\n10.知识局限\n11.情感基调\n12.可视化建议"));
    }

    loadSettings();
    addMessage("system","✨ 系统已启动：团队协作、批判式意识、中英文切换、完整共识判断等已集成。");
    setInterval(healthCheckAll, 300000);
</script>
